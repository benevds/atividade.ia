<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioCards | Premium Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <div class="logo">✨ BioCards</div>
            <p>Transformando dados em celebração.</p>
        </header>

        <main class="main-content">
            <section class="config-panel">
                <h3>Personalize seu Card</h3>
                
                <div class="input-group">
                    <label>Quem é a estrela do dia?</label>
                    <input type="text" id="inputNome" placeholder="Digite o nome..." maxlength="20">
                </div>

                <div class="input-group">
                    <label>Quantas primaveras?</label>
                    <input type="number" id="inputIdade" placeholder="Ex: 21">
                </div>

                <div class="input-group">
                    <label>Paleta de Cores</label>
                    <div class="color-options">
                        <div class="color-dot active" data-theme="sunset" style="background: linear-gradient(45deg, #ff9a9e, #fad0c4);"></div>
                        <div class="color-dot" data-theme="ocean" style="background: linear-gradient(45deg, #2193b0, #6dd5ed);"></div>
                        <div class="color-dot" data-theme="emerald" style="background: linear-gradient(45deg, #11998e, #38ef7d);"></div>
                        <div class="color-dot" data-theme="midnight" style="background: linear-gradient(45deg, #232526, #414345);"></div>
                    </div>
                </div>

                <button class="btn-primary" id="btnDownload">Finalizar e Salvar</button>
            </section>

            <section class="preview-panel">
                <div class="card-preview sunset" id="mainCard">
                    <div class="card-glass">
                        <div class="card-header">
                            <span class="badge">Especial para você</span>
                        </div>
                        <div class="card-body">
                            <h2 id="cardNome">Seu Nome</h2>
                            <div class="divider"></div>
                            <p id="cardIdade">Feliz Aniversário!</p>
                        </div>
                        <div class="card-footer">
                            <p>Que seu dia seja tão incrível quanto este código.</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
